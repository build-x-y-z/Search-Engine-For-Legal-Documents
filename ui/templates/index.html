<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Legal Document Search Engine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="page">
        <section class="search-panel{% if results or error %} has-results{% endif %}">
            <h1>Legal Document Search Engine</h1>

            <form method="post" class="search-form">
                <input
                    type="text"
                    name="query"
                    class="search-box"
                    placeholder="Search legal documents"
                    value="{{ query }}"
                    autocomplete="off"
                    autofocus
                    required
                >
                <button type="submit" class="search-button">Search</button>
            </form>

            {% if error %}
            <section class="results">
                <h2>Error</h2>
                <pre class="results-output error">{{ error }}</pre>
            </section>
            {% endif %}

            {% if results %}
            <section class="results">
                <h2>Results</h2>
                <pre class="results-output">{{ results }}</pre>
            </section>
            {% endif %}
        </section>
    </main>
</body>
</html>
